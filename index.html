// Timeout Helper for broad browser compatibility
const fetchWithTimeout = async (url, options = {}, timeout = 8000) => {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  try {
    const response = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(id);
    return response;
  } catch (error) {
    clearTimeout(id);
    throw error;
  }
};

// Security: catch block updated for older device support
const isSafeUrl = (url) => {
  if (!url || typeof url !== 'string') return false;
  try { return new URL(url).protocol === 'https:'; } catch (err) { return false; }
};

const sanitizeText = (text, maxLen = 300) => {
  if (!text || typeof text !== 'string') return '';
  return text.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '').slice(0, maxLen).trim();
};

// Display bug fixed here
let _syncTimer = null;
function showSyncStatus(status, message) {
  const el = document.getElementById('sync-status');
  if (_syncTimer) { clearTimeout(_syncTimer); _syncTimer = null; }
  el.style.display = 'block';
  el.className = 'sync-indicator ' + status;
  el.textContent = message;
  if (status === 'saved') {
    _syncTimer = setTimeout(() => { el.style.display = 'none'; _syncTimer = null; }, 2000);
  }
}

  const _copertoShow = coperto && coperto.enabled && !isSunday && kitchenCats.includes(subCategory);
  const renderCoperto = (style) => {

    );
    return null;
  };
  const activeMode = isSunday ? 'sunday' : 'default';
  const menu = menuData[activeMode] || defaultMenu;
  const specials = fullSpecials[activeMode] || defaultSpecials;
  const unavailableItems = fullUnavailable[activeMode] || [];

  const unavailableText = { it: 'Non Disponibile', en: 'Not Available', es: 'No Disponible', fr: 'Non Disponible', de: 'Nicht Verfügbar', zh: '暂不供应', ja: '提供不可' };

  const fixItemIds = (dualMenu) => {
    let maxId = 0;
    ['default', 'sunday'].forEach(mode => {
      if (!dualMenu[mode]) return;
      Object.entries(dualMenu[mode]).filter(([k]) => k !== '_subcategories').forEach(([, items]) => {
        if (Array.isArray(items)) items.forEach(i => { if (typeof i.id === 'number' && !isNaN(i.id) && i.id > maxId) maxId = i.id; });
      });
    });
    const fixed = {};
    ['default', 'sunday'].forEach(mode => {
      if (!dualMenu[mode]) return;
      fixed[mode] = { ...dualMenu[mode] };
      Object.entries(dualMenu[mode]).filter(([k]) => k !== '_subcategories').forEach(([cat, items]) => {
        if (!Array.isArray(items)) return;
        fixed[mode][cat] = items.map(i => {
          if (typeof i.id !== 'number' || isNaN(i.id)) return { ...i, id: ++maxId };
          return i;
        });
      });
    });
    return fixed;
  };

  const inlineSubcategories = (dualMenu) => {
    let maxId = 0;
    ['default', 'sunday'].forEach(mode => {
      if (!dualMenu[mode]) return;
      Object.entries(dualMenu[mode]).filter(([k]) => k !== '_subcategories').forEach(([, items]) => {
        if (Array.isArray(items)) items.forEach(i => { if (typeof i.id === 'number' && !isNaN(i.id) && i.id > maxId) maxId = i.id; });
      });
    });
    const result = {};
    ['default', 'sunday'].forEach(mode => {
      if (!dualMenu[mode]) { result[mode] = dualMenu[mode]; return; }
      result[mode] = { ...dualMenu[mode] };
      const subs = result[mode]._subcategories;
      if (!subs || typeof subs !== 'object') { delete result[mode]._subcategories; return; }
      for (const [cat, catSubs] of Object.entries(subs)) {
        if (!Array.isArray(catSubs) || !Array.isArray(result[mode][cat])) continue;
        if (result[mode][cat].some(i => i.type === 'subcategory')) continue;
        const items = result[mode][cat];
        const newItems = [];
        const placed = new Set();
        for (const sub of catSubs) {
          const subIt = typeof sub === 'string' ? sub : sub.it;
          const subName = typeof sub === 'string' ? { it: sub } : sub;
          const matching = items.filter(i => i.subcategory === subIt);
          if (matching.length > 0) {
            newItems.push({ id: ++maxId, type: 'subcategory', name: subName });
            matching.forEach(i => { newItems.push(i); placed.add(i); });
          }
        }
        items.forEach(i => { if (!placed.has(i)) newItems.push(i); });
        result[mode][cat] = newItems;
      }
      delete result[mode]._subcategories;
    });
    return result;
  };

  const migrateMenuData = (data) => {
    const rawMenu = data.menu || {};
    let dual;
    if (rawMenu.default && typeof rawMenu.default === 'object' && (rawMenu.default.appetizers || rawMenu.default.softdrinks)) {
      dual = rawMenu;
    } else {
      const barItems = {
        softdrinks: rawMenu.softdrinks || defaultMenu.softdrinks,
        wine: rawMenu.wine || defaultMenu.wine,
        beer: rawMenu.beer || defaultMenu.beer,
        cocktails: rawMenu.cocktails || defaultMenu.cocktails,
        spirits: rawMenu.spirits || defaultMenu.spirits,
        amari: rawMenu.amari || defaultMenu.amari,
        _subcategories: rawMenu._subcategories || {}
      };
      dual = {
        default: { ...defaultMenu, ...barItems },
        sunday: { ...sundayMenu, ...barItems }
      };
    }
    let sp = data.specials;
    if (Array.isArray(sp)) sp = { default: sp, sunday: sp };
    else if (!sp || typeof sp !== 'object' || !sp.default) sp = { default: defaultSpecials, sunday: defaultSpecials };
    let ua = data.unavailable_items;
    if (Array.isArray(ua)) ua = { default: ua, sunday: [] };
    else if (!ua || typeof ua !== 'object' || !ua.default) ua = { default: [], sunday: [] };
    return { menu: dual, specials: sp, unavailable_items: ua };
  };

  useEffect(() => {
    async function loadMenu() {
      try {
        const data = await supabase.getMenu();
        if (data) {
          if (data.menu_override) setMenuOverride(data.menu_override);
          if (data.menu && data.menu._coperto) setCoperto(data.menu._coperto);
          const migrated = migrateMenuData(data);
          const fixed = fixItemIds(migrated.menu);
          const inlined = inlineSubcategories(fixed);
          setMenuData(inlined);
          setFullSpecials(migrated.specials);
          setFullUnavailable(migrated.unavailable_items);
          // Auto-translate subcategories missing translations
          const untranslated = [];
          for (const mode of ['default', 'sunday']) {
            if (!inlined[mode]) continue;
            for (const [cat, items] of Object.entries(inlined[mode])) {
              if (!Array.isArray(items)) continue;
              for (const item of items) {
                if (item.type === 'subcategory' && item.name && Object.keys(item.name).length <= 1 && item.name.it) {
                  untranslated.push({ mode, cat, id: item.id, text: item.name.it });
                }
              }
            }
          }
          if (untranslated.length > 0) {
            try {
              const res = await fetchWithTimeout(SUPABASE_URL + '/functions/v1/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
                body: JSON.stringify({ texts: untranslated.map((u, i) => ({ text: u.text, id: 'sub_' + i })) })
              }, 20000);
              const tData = await res.json();
              if (tData.results) {
                const updated = { ...inlined };
                untranslated.forEach((u, i) => {
                  const tr = tData.results['sub_' + i];
                  if (!tr) return;
                  updated[u.mode] = { ...updated[u.mode] };
                  updated[u.mode][u.cat] = updated[u.mode][u.cat].map(item =>
                    item.id === u.id ? { ...item, name: { it: u.text, ...tr } } : item
                  );
                });
                setMenuData(updated);
                saveToSupabase(updated, migrated.specials);
              }
            } catch (err) { console.error('Auto-translate subcategories error:', err); }
          }
        }
      } catch (error) {
        console.error('Error loading menu:', error);
      } finally {
        setIsLoading(false);
        document.getElementById('loading').style.display = 'none';

    }
    loadMenu();
    const safetyTimer = setTimeout(() => {
      setIsLoading(false);
      const el = document.getElementById('loading');
      if (el) el.style.display = 'none';

    return () => clearTimeout(safetyTimer);

      if (!isAdmin) setShowPinModal(true);
    }
  };

  const PIN_HASH = '8beedb9068239aa2e47b1d31c551e5cd5ce5fb1daad51479a136a2af677e06ed';

  const checkPin = async () => {
    if (lockedUntil && Date.now() < lockedUntil) {
      const secs = Math.ceil((lockedUntil - Date.now()) / 1000);
      alert(`Accesso bloccato. Riprova tra ${secs} secondi.`);
      setPin('');
      return;
    }
    const msgBuffer = new TextEncoder().encode(pin);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashHex = Array.from(new Uint8Array(hashBuffer))
      .map(b => b.toString(16).padStart(2, '0')).join('');
    if (hashHex === PIN_HASH) {
      setIsAdmin(true);
      setAdminPinHash(hashHex);
      setShowPinModal(false);
      setPin('');
      setFailedAttempts(0);
      setLockedUntil(null);
    } else {
      const next = failedAttempts + 1;
      if (next >= MAX_PIN_ATTEMPTS) {
        setLockedUntil(Date.now() + LOCKOUT_SECONDS * 1000);
        setFailedAttempts(0);
        alert(`Troppi tentativi errati. Accesso bloccato per ${LOCKOUT_SECONDS} secondi.`);
      } else {
        setFailedAttempts(next);
        alert(`PIN errato! Tentativi rimasti: ${MAX_PIN_ATTEMPTS - next}`);
      }
      setPin('');
    }
  };

      Object.entries(menuData[mode] || {}).filter(([k]) => k !== '_subcategories').flatMap(([, v]) => Array.isArray(v) ? v : []).map(i => typeof i.id === 'number' && !isNaN(i.id) ? i.id : 0)
    );
    const newId = (allIds.length > 0 ? Math.max(...allIds) : 0) + 1;
    const newModeMenu = { ...menu, [subCategory]: [...menu[subCategory], { ...item, id: newId }] };
    const newData = updateMode(newModeMenu);
    saveToSupabase(newData, fullSpecials);

    const items = [...menu[cat]];

    if (newIndex < 0 || newIndex >= items.length) return;
    [items[index], items[newIndex]] = [items[newIndex], items[index]];
    const newData = updateMode({ ...menu, [cat]: items });
    saveToSupabase(newData, fullSpecials);

          )

          ),
          e('div', null,
            e('label', { style: { display: 'block', fontSize: '11px', color: '#718096', marginBottom: '3px' }}, 'Servizio'),
            e('div', { style: { display: 'flex', gap: '4px' }},
              e('button', { type: 'button', onClick: () => setFormData({ ...formData, serving: formData.serving === 'bottle' ? '' : 'bottle' }), style: { padding: '6px 12px', border: '2px solid', borderColor: formData.serving === 'bottle' ? '#6b46c1' : '#e2e8f0', background: formData.serving === 'bottle' ? '#faf5ff' : '#fff', borderRadius: '6px', cursor: 'pointer', fontSize: '18px' }}, e('img', { src: 'icons/wine-bottle.svg', width: 22, height: 22 })),
              e('button', { type: 'button', onClick: () => setFormData({ ...formData, serving: formData.serving === 'glass' ? '' : 'glass' }), style: { padding: '6px 12px', border: '2px solid', borderColor: formData.serving === 'glass' ? '#6b46c1' : '#e2e8f0', background: formData.serving === 'glass' ? '#faf5ff' : '#fff', borderRadius: '6px', cursor: 'pointer', fontSize: '18px' }}, e('img', { src: 'icons/wine-glass.svg', width: 22, height: 22 }))

        e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', alignItems: 'flex-end' }},
          e('div', { style: { width: '80px' }},

}

function EditSpecialsModal({ specials, lang, onSave, onClose }) {
  const [items, setItems] = useState([...specials]);
  const [translatingIdx, setTranslatingIdx] = useState(null);
  const [translatedItems, setTranslatedItems] = useState([]);

  const updateItem = (idx, field, value, subfield) => {
    const newItems = items.map((item, i) => {
      if (i !== idx) return item;
      if (subfield) return { ...item, [field]: { ...item[field], [subfield]: value } };
      return { ...item, [field]: value };
    });
    setItems(newItems);
    if (subfield === 'it') setTranslatedItems(prev => prev.filter(i => i !== idx));
  };

  const translateSpecial = async (idx) => {
    if (!items[idx].name.it.trim()) return alert('Inserisci prima il nome in italiano.');
    setTranslatingIdx(idx);
    try {
      const textsToTranslate = [{ text: items[idx].name.it, id: 'name' }];
      if (items[idx].description.it.trim()) {
        textsToTranslate.push({ text: items[idx].description.it, id: 'description' });
      }
      const res = await fetchWithTimeout(SUPABASE_URL + '/functions/v1/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
        body: JSON.stringify({ texts: textsToTranslate, context: 'food_menu' })
      }, 20000);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const newItems = items.map((item, i) => i !== idx ? item : { ...item, name: { ...item.name }, description: { ...item.description } });
      if (data.results.name) {
        Object.entries(data.results.name).forEach(([tl, txt]) => { newItems[idx].name[tl] = sanitizeText(txt); });
      }
      if (data.results.description) {
        Object.entries(data.results.description).forEach(([tl, txt]) => { newItems[idx].description[tl] = sanitizeText(txt, 500); });
      }
      setItems(newItems);
      setTranslatedItems(prev => [...new Set([...prev, idx])]);
    } catch(err) {
      alert('Errore nella traduzione automatica.');
    } finally {
      setTranslatingIdx(null);
    }
  };

  const addSpecial = () => {
    setItems([...items, { id: Date.now(), name: { it: '', en: '', es: '', fr: '', de: '', zh: '', ja: '' }, price: 0, description: { it: '', en: '', es: '', fr: '', de: '', zh: '', ja: '' }}]);
  };

  const removeSpecial = (idx) => {
    setItems(items.filter((_, i) => i !== idx));
    setTranslatedItems(prev => prev.filter(i => i !== idx).map(i => i > idx ? i - 1 : i));
  };

  const otherLangs = LANGUAGES.filter(l => l.code !== 'it');

  return e('div', {
    style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, overflow: 'auto', padding: '20px' },
    onClick: onClose
  },
    e('div', {
      style: { background: '#fff', borderRadius: '16px', padding: 'clamp(20px, 4vw, 32px)', maxWidth: '700px', width: '100%', maxHeight: '90vh', overflow: 'auto' },
      onClick: ev => ev.stopPropagation()
    },
      e('h3', { style: { margin: '0 0 20px', color: '#2d3748' }}, '📋 Modifica Speciali del Giorno'),
      items.map((item, idx) =>
        e('div', { key: item.id, style: { marginBottom: '24px', padding: '16px', background: '#f7fafc', borderRadius: '12px' }},
          e('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '12px' }},
            e('strong', null, 'Speciale #', idx + 1),
            e('button', { onClick: () => removeSpecial(idx), style: { background: '#e53e3e', color: '#fff', border: 'none', borderRadius: '4px', padding: '4px 8px', cursor: 'pointer', fontSize: '12px' }}, '🗑️ Rimuovi')
          ),
          e('div', { style: { marginBottom: '6px' }},
            e('label', { style: { display: 'block', fontSize: '11px', color: '#718096', marginBottom: '3px' }}, '🇮🇹 Nome (Italiano)'),
            e('div', { style: { display: 'flex', gap: '8px' }},
              e('input', {
                type: 'text',
                placeholder: '🇮🇹 Nome',
                value: item.name.it || '',
                onChange: ev => updateItem(idx, 'name', ev.target.value, 'it'),
                style: { flex: 1, padding: '8px', border: '1px solid #e2e8f0', borderRadius: '4px', boxSizing: 'border-box' }
              }),
              e('button', {
                type: 'button',
                onClick: () => translateSpecial(idx),
                disabled: translatingIdx === idx,
                style: { padding: '8px 12px', background: '#ca4d4f', color: '#fff', border: 'none', borderRadius: '4px', cursor: translatingIdx === idx ? 'wait' : 'pointer', fontSize: '12px', whiteSpace: 'nowrap', opacity: translatingIdx === idx ? 0.7 : 1 }
              }, translatingIdx === idx ? '⏳ ...' : '🌐 Traduci')
            )
          ),
          e('div', { style: { marginBottom: '8px' }},
            e('label', { style: { display: 'block', fontSize: '11px', color: '#718096', marginBottom: '3px' }}, '🇮🇹 Descrizione (Italiano)'),
            e('input', {
              type: 'text',
              placeholder: '🇮🇹 Descrizione',
              value: item.description.it || '',
              onChange: ev => updateItem(idx, 'description', ev.target.value, 'it'),
              style: { width: '100%', padding: '8px', border: '1px solid #e2e8f0', borderRadius: '4px', boxSizing: 'border-box' }
            })
          ),
          translatedItems.includes(idx) && e('div', { style: { margin: '2px 0 8px', padding: '7px 12px', background: '#fffbea', border: '1px solid #f6e05e', borderRadius: '4px', fontSize: '12px', color: '#744210' }},
            '✅ Traduzioni generate — controlla e correggi se necessario.'
          ),
          otherLangs.map(l =>
            e('div', { key: l.code, style: { marginBottom: '8px' }},
              e('input', {
                type: 'text',
                placeholder: l.flag + ' Nome',
                value: item.name[l.code] || '',
                onChange: ev => updateItem(idx, 'name', ev.target.value, l.code),
                style: { width: '100%', padding: '8px', border: translatedItems.includes(idx) ? '1px solid #bee3f8' : '1px solid #e2e8f0', borderRadius: '4px', marginBottom: '4px', boxSizing: 'border-box', background: translatedItems.includes(idx) ? '#ebf8ff' : '#fff' }
              }),
              e('input', {
                type: 'text',
                placeholder: l.flag + ' Descrizione',
                value: item.description[l.code] || '',
                onChange: ev => updateItem(idx, 'description', ev.target.value, l.code),
                style: { width: '100%', padding: '8px', border: translatedItems.includes(idx) ? '1px solid #bee3f8' : '1px solid #e2e8f0', borderRadius: '4px', boxSizing: 'border-box', background: translatedItems.includes(idx) ? '#ebf8ff' : '#fff' }
              })
            )
          ),
          e('input', {
            type: 'number',
            step: '0.5',
            placeholder: 'Prezzo',
            value: item.price,
            onChange: ev => updateItem(idx, 'price', parseFloat(ev.target.value) || 0),
            style: { width: '100px', padding: '8px', border: '1px solid #e2e8f0', borderRadius: '4px', marginTop: '8px' }
          })
        )
      ),
      e('button', { onClick: addSpecial, style: { width: '100%', padding: '12px', border: '2px dashed #e2e8f0', background: '#fff', borderRadius: '8px', cursor: 'pointer', marginBottom: '20px', color: '#718096' }}, '+ Aggiungi Speciale'),
      e('div', { style: { display: 'flex', gap: '12px' }},
        e('button', { onClick: onClose, style: { flex: 1, padding: '12px', border: '1px solid #e2e8f0', background: '#fff', borderRadius: '8px', cursor: 'pointer' }}, 'Annulla'),
        e('button', { onClick: () => onSave(items), style: { flex: 1, padding: '12px', border: 'none', background: '#ca4d4f', color: '#fff', borderRadius: '8px', cursor: 'pointer' }}, 'Salva Speciali')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
