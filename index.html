  { id: 102, name: { it: 'Filetto di branzino', en: 'Sea bass fillet', es: 'Filete de lubina', fr: 'Filet de bar', de: 'Wolfsbarschfilet' }, price: 22, description: { it: 'Con verdure di stagione e salsa agli agrumi', en: 'With seasonal vegetables and citrus sauce', es: 'Con verduras de temporada y salsa de cítricos', fr: 'Avec légumes de saison et sauce aux agrumes', de: 'Mit saisonalem Gemüse und Zitrussauce' }}
];

// Sync status helper
function showSyncStatus(status, message) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-indicator ' + status;
  el.textContent = message;
  if (status === 'saved') {
    setTimeout(() => { el.style.display = 'none'; }, 2000);
  }
}

function App() {
  const [menu, setMenu] = useState(defaultMenu);
  const [specials, setSpecials] = useState(defaultSpecials);
  const [showSpecials, setShowSpecials] = useState(true);
  const [lang, setLang] = useState('it');
  const [mainTab, setMainTab] = useState('kitchen');
  const [subCategory, setSubCategory] = useState('appetizers');
  const [isAdmin, setIsAdmin] = useState(false);
  const [showPinModal, setShowPinModal] = useState(false);
  const [pin, setPin] = useState('');
  const [showLangMenu, setShowLangMenu] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [showEditModal, setShowEditModal] = useState(false);
  const [showAddModal, setShowAddModal] = useState(false);
  const [showEditSpecials, setShowEditSpecials] = useState(false);
  const [isLoading, setIsLoading] = useState(true);
  const [failedAttempts, setFailedAttempts] = useState(0);
  const [lockedUntil, setLockedUntil] = useState(null);
  const clickCount = useRef(0);
  const clickTimer = useRef(null);
  const MAX_PIN_ATTEMPTS = 5;
  const LOCKOUT_SECONDS = 60;

  const kitchenCats = ['appetizers', 'primi', 'secondi', 'contorni', 'dessert'];
  const barCats = ['softdrinks', 'wine', 'beer', 'cocktails', 'spirits'];

  // Load menu from Supabase on startup
  useEffect(() => {
    async function loadMenu() {
      try {
        const data = await supabase.getMenu();
        if (data && data.menu && Object.keys(data.menu).length > 0) {
          setMenu(data.menu);
          setSpecials(data.specials || defaultSpecials);
        } else {
          // Initialize database with default menu
          await supabase.saveMenu(defaultMenu, defaultSpecials);
        }
      } catch (error) {
        console.error('Error loading menu:', error);
      } finally {
        setIsLoading(false);
        document.getElementById('loading').style.display = 'none';
      }
    }
    loadMenu();
  }, []);

  // Save to Supabase when menu changes (admin only)
  const saveToSupabase = async (newMenu, newSpecials) => {
    showSyncStatus('saving', '💾 Salvando...');
    try {
      await supabase.saveMenu(newMenu, newSpecials);
      showSyncStatus('saved', '✅ Salvato!');
    } catch (error) {
      console.error('Error saving:', error);
      showSyncStatus('error', '❌ Errore di salvataggio');
    }
  };

  const handleCopyrightClick = () => {
    clickCount.current++;
    if (clickTimer.current) clearTimeout(clickTimer.current);
    clickTimer.current = setTimeout(() => { clickCount.current = 0; }, 400);
    if (clickCount.current >= 2) {
      clickCount.current = 0;
      if (!isAdmin) setShowPinModal(true);
    }
  };

  // SHA-256 hash of the admin PIN (do not store the PIN in plain text)
  const PIN_HASH = '8beedb9068239aa2e47b1d31c551e5cd5ce5fb1daad51479a136a2af677e06ed';

  const checkPin = async () => {
    // Check lockout
    if (lockedUntil && Date.now() < lockedUntil) {
      const secs = Math.ceil((lockedUntil - Date.now()) / 1000);
      alert(`Accesso bloccato. Riprova tra ${secs} secondi.`);
      setPin('');
      return;
    }
    const msgBuffer = new TextEncoder().encode(pin);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashHex = Array.from(new Uint8Array(hashBuffer))
      .map(b => b.toString(16).padStart(2, '0')).join('');
    if (hashHex === PIN_HASH) {
      setIsAdmin(true);
      setShowPinModal(false);
      setPin('');
      setFailedAttempts(0);
      setLockedUntil(null);
    } else {
      const next = failedAttempts + 1;
      if (next >= MAX_PIN_ATTEMPTS) {
        setLockedUntil(Date.now() + LOCKOUT_SECONDS * 1000);
        setFailedAttempts(0);
        alert(`Troppi tentativi errati. Accesso bloccato per ${LOCKOUT_SECONDS} secondi.`);
      } else {
        setFailedAttempts(next);
        alert(`PIN errato! Tentativi rimasti: ${MAX_PIN_ATTEMPTS - next}`);
      }
      setPin('');
    }
  };

  const deleteItem = (cat, id) => {
    if (confirm('Eliminare questo elemento?')) {
      const newMenu = { ...menu, [cat]: menu[cat].filter(i => i.id !== id) };
      setMenu(newMenu);
      saveToSupabase(newMenu, specials);
    }
  };

  const saveEditItem = (item) => {
    const newMenu = {
      ...menu,
      [subCategory]: menu[subCategory].map(i => i.id === item.id ? item : i)
    };
    setMenu(newMenu);
    saveToSupabase(newMenu, specials);
    setShowEditModal(false);
    setEditItem(null);
  };

  const addNewItem = (item) => {
    const newId = Math.max(...Object.values(menu).flat().map(i => i.id)) + 1;
    const newMenu = {
      ...menu,
      [subCategory]: [...menu[subCategory], { ...item, id: newId }]
    };
    setMenu(newMenu);
    saveToSupabase(newMenu, specials);
    setShowAddModal(false);
  };

  const saveSpecials = (newSpecials) => {
    setSpecials(newSpecials);
    saveToSupabase(menu, newSpecials);
    setShowEditSpecials(false);
  };

  useEffect(() => {
    if (mainTab === 'kitchen' && !kitchenCats.includes(subCategory)) {
      setSubCategory('appetizers');
    } else if (mainTab === 'bar' && !barCats.includes(subCategory)) {
      setSubCategory('softdrinks');
    }
  }, [mainTab]);

  const currentItems = menu[subCategory] || [];

  if (isLoading) return null;

  return e('div', { style: { fontFamily: "'Georgia', serif", minHeight: '100vh', background: 'linear-gradient(135deg, #fff8f5 0%, #fff 100%)' }},
    showSpecials && e(SpecialsPopup, { specials, lang, onClose: () => setShowSpecials(false) }),
    showPinModal && e(PinModal, { pin, setPin, onSubmit: checkPin, onClose: () => { setShowPinModal(false); setPin(''); }}),
    showEditModal && editItem && e(EditModal, { item: editItem, lang, onSave: saveEditItem, onClose: () => { setShowEditModal(false); setEditItem(null); }}),
    showAddModal && e(AddModal, { lang, onSave: addNewItem, onClose: () => setShowAddModal(false) }),
    showEditSpecials && e(EditSpecialsModal, { specials, lang, onSave: saveSpecials, onClose: () => setShowEditSpecials(false) }),
    
    e('header', { style: { background: '#ca4d4f', padding: '16px 24px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '14px' }},
      e('img', { src: 'logo.png', alt: 'Borgo della Mistica', style: { height: '60px', objectFit: 'contain', background: '#fff', padding: '6px 16px', borderRadius: '10px' }}),
      e('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', flexWrap: 'wrap', justifyContent: 'center' }},
        e('div', { style: { position: 'relative' }},
          e('button', { 
            onClick: () => setShowLangMenu(!showLangMenu),
            style: { background: '#fff', border: 'none', borderRadius: '8px', padding: '8px 16px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '8px', fontSize: '14px' }
          }, LANGUAGES.find(l => l.code === lang)?.flag, ' ', LANGUAGES.find(l => l.code === lang)?.name),
          showLangMenu && e('div', { 
            style: { position: 'absolute', top: '100%', right: 0, background: '#fff', borderRadius: '8px', boxShadow: '0 4px 20px rgba(0,0,0,0.15)', zIndex: 100, marginTop: '4px', overflow: 'hidden' }
          },
            LANGUAGES.map(l => e('button', {
              key: l.code,
              onClick: () => { setLang(l.code); setShowLangMenu(false); },
              style: { display: 'block', width: '100%', padding: '10px 20px', border: 'none', background: lang === l.code ? '#ca4d4f' : '#fff', color: lang === l.code ? '#fff' : '#333', cursor: 'pointer', textAlign: 'left', fontSize: '14px' }
            }, l.flag, ' ', l.name))
          )
        ),
        e('button', {
          onClick: () => setShowSpecials(true),
          style: { background: '#1a365d', color: '#fff', border: 'none', borderRadius: '8px', padding: '8px 16px', cursor: 'pointer', fontSize: '14px' }
        }, '📋 ', lang === 'it' ? 'Speciali' : lang === 'es' ? 'Especiales' : lang === 'fr' ? 'Spécialités' : lang === 'de' ? 'Tagesgerichte' : 'Specials'),
        isAdmin && e('button', {
          onClick: () => setShowEditSpecials(true),
          style: { background: '#2d3748', color: '#fff', border: 'none', borderRadius: '8px', padding: '8px 12px', cursor: 'pointer', fontSize: '12px' }
        }, '✏️'),
        isAdmin && e('button', {
          onClick: () => setIsAdmin(false),
          style: { background: '#c53030', color: '#fff', border: 'none', borderRadius: '8px', padding: '8px 16px', cursor: 'pointer', fontSize: '14px' }
        }, '🔓 Esci')
      )
    ),
    
    e('nav', { style: { background: '#fff', borderBottom: '1px solid #e2e8f0', padding: '0 24px', overflowX: 'auto' }},
      e('div', { style: { display: 'flex', gap: '0' }},
        e('button', {
          onClick: () => setMainTab('kitchen'),
          style: { padding: '16px 32px', border: 'none', background: mainTab === 'kitchen' ? '#ca4d4f' : 'transparent', color: mainTab === 'kitchen' ? '#fff' : '#333', cursor: 'pointer', fontSize: '16px', fontWeight: '600', borderRadius: '0', whiteSpace: 'nowrap' }
        }, '🍽️ ', lang === 'it' ? 'Cucina' : lang === 'es' ? 'Cocina' : lang === 'fr' ? 'Cuisine' : lang === 'de' ? 'Küche' : 'Kitchen'),
        e('button', {
          onClick: () => setMainTab('bar'),
          style: { padding: '16px 32px', border: 'none', background: mainTab === 'bar' ? '#ca4d4f' : 'transparent', color: mainTab === 'bar' ? '#fff' : '#333', cursor: 'pointer', fontSize: '16px', fontWeight: '600', borderRadius: '0', whiteSpace: 'nowrap' }
        }, '🍸 Bar')
      )
    ),
    
    e('div', { style: { display: 'flex', gap: '8px', padding: '16px 24px', background: '#f7fafc', flexWrap: 'wrap' }},
      (mainTab === 'kitchen' ? kitchenCats : barCats).map(cat => 
        e('button', {
          key: cat,
          onClick: () => setSubCategory(cat),
          style: { padding: '10px 20px', border: subCategory === cat ? '2px solid #ca4d4f' : '1px solid #e2e8f0', background: subCategory === cat ? '#fff' : '#fff', color: subCategory === cat ? '#ca4d4f' : '#666', cursor: 'pointer', borderRadius: '24px', fontSize: '14px', fontWeight: subCategory === cat ? '600' : '400' }
        }, CATEGORY_NAMES[cat]?.[lang] || cat)
      )
    ),
    
    e('main', { style: { padding: '24px', maxWidth: '900px', margin: '0 auto' }},
      e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px', flexWrap: 'wrap', gap: '12px' }},
        e('h2', { style: { margin: 0, color: '#ca4d4f', fontSize: '28px', fontWeight: '600' }}, CATEGORY_NAMES[subCategory]?.[lang] || subCategory),
        isAdmin && e('button', {
          onClick: () => setShowAddModal(true),
          style: { background: '#38a169', color: '#fff', border: 'none', borderRadius: '8px', padding: '10px 20px', cursor: 'pointer', fontSize: '14px', fontWeight: '500' }
        }, '+ ', lang === 'it' ? 'Aggiungi' : 'Add')
      ),
      
      e('div', { style: { display: 'flex', flexDirection: 'column', gap: '12px' }},
        currentItems.map(item => 
          e('div', { 
            key: item.id,
            style: { background: '#fff', borderRadius: '12px', padding: '20px', boxShadow: '0 2px 8px rgba(0,0,0,0.06)', border: '1px solid #e2e8f0', display: 'flex', gap: '16px', alignItems: 'flex-start' }
          },
            lang !== 'it' && isSafeUrl(item.image) && e('img', { src: item.image, style: { width: '80px', height: '80px', objectFit: 'cover', borderRadius: '8px' }, referrerPolicy: 'no-referrer' }),
            e('div', { style: { flex: 1 }},
              e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }},
                e('h3', { style: { margin: 0, fontSize: '16px', fontWeight: '500', color: '#2d3748', flex: 1, paddingRight: '16px' }}, item.name[lang] || item.name.it),
                e('span', { style: { fontSize: '18px', fontWeight: '600', color: '#ca4d4f', whiteSpace: 'nowrap' }}, '€ ', item.price.toFixed(2))
              ),
              item.allergens && item.allergens.length > 0 && e('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', marginTop: '8px' }},
                item.allergens.map(a => e(AllergenIcon, { key: a, type: a, lang }))
              ),
              isAdmin && e('div', { style: { display: 'flex', gap: '8px', marginTop: '12px' }},
                e('button', {
                  onClick: () => { setEditItem(item); setShowEditModal(true); },
                  style: { background: '#3182ce', color: '#fff', border: 'none', borderRadius: '6px', padding: '6px 12px', cursor: 'pointer', fontSize: '12px' }
                }, '✏️ Modifica'),
                e('button', {
                  onClick: () => deleteItem(subCategory, item.id),
                  style: { background: '#e53e3e', color: '#fff', border: 'none', borderRadius: '6px', padding: '6px 12px', cursor: 'pointer', fontSize: '12px' }
                }, '🗑️ Elimina')
              )
            )
          )
        )
      ),
      
      e('div', { style: { marginTop: '32px', padding: '16px', background: '#f7fafc', borderRadius: '12px' }},
        e('h4', { style: { margin: '0 0 12px', fontSize: '14px', color: '#718096' }}, lang === 'it' ? 'Legenda Allergeni' : lang === 'es' ? 'Leyenda de Alérgenos' : lang === 'fr' ? 'Légende des Allergènes' : lang === 'de' ? 'Allergen-Legende' : 'Allergen Legend'),
        e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '16px' }},
          Object.entries(ALLERGENS).map(([key, val]) => 
            e('span', { key, style: { fontSize: '12px', color: '#4a5568', display: 'flex', alignItems: 'center', gap: '6px' }}, 
              e(AllergenIcon, { type: key, lang }),
              ' ', val.name[lang]
            )
          )
        )
      )
    ),
    
    e('footer', { style: { textAlign: 'center', padding: '24px', color: '#a0aec0', fontSize: '12px' }},
      e('span', { 
        onClick: handleCopyrightClick,
        style: { cursor: 'default', userSelect: 'none' }
      }, '© ' + new Date().getFullYear() + ' Borgo della Mistica - Hampton by Hilton')
    )
  );
}

  return e('div', {
    style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, padding: '20px' },

    e('div', {
      style: { background: '#fff', borderRadius: '16px', padding: '32px', maxWidth: '320px', width: '100%', textAlign: 'center' },

}

  const [formData, setFormData] = useState({ ...item });
  
  const toggleAllergen = (a) => {
    const current = formData.allergens || [];
    setFormData({ ...formData, allergens: current.includes(a) ? current.filter(x => x !== a) : [...current, a] });
  };
  
  return e('div', {
    style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, overflow: 'auto', padding: '20px' },
    onClick: onClose

    e('div', {
      style: { background: '#fff', borderRadius: '16px', padding: '32px', maxWidth: '600px', width: '100%', maxHeight: '90vh', overflow: 'auto' },

    },
      e('h3', { style: { margin: '0 0 20px', color: '#2d3748' }}, '✏️ Modifica Piatto'),
      LANGUAGES.map(l => 
        e('div', { key: l.code, style: { marginBottom: '16px' }},
          e('label', { style: { display: 'block', fontSize: '12px', color: '#718096', marginBottom: '4px' }}, l.flag, ' Nome (', l.name, ')'),
          e('input', {
            type: 'text',
            maxLength: 250,
            value: formData.name[l.code] || '',

            style: { width: '100%', padding: '10px', border: '1px solid #e2e8f0', borderRadius: '6px', boxSizing: 'border-box' }
          })
        )
      ),
      e('div', { style: { marginBottom: '16px' }},
        e('label', { style: { display: 'block', fontSize: '12px', color: '#718096', marginBottom: '4px' }}, 'Prezzo (€)'),
        e('input', {
          type: 'number',
          step: '0.5',
          value: formData.price,
          onChange: ev => setFormData({ ...formData, price: parseFloat(ev.target.value) || 0 }),
          style: { width: '120px', padding: '10px', border: '1px solid #e2e8f0', borderRadius: '6px' }
        })
      ),
      e('div', { style: { marginBottom: '16px' }},
        e('label', { style: { display: 'block', fontSize: '12px', color: '#718096', marginBottom: '8px' }}, 'Allergeni'),
        e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px' }},
          Object.entries(ALLERGENS).map(([key, val]) => 
            e('button', {
              key,
              type: 'button',
              onClick: () => toggleAllergen(key),
              style: { padding: '6px 12px', border: '1px solid', borderColor: (formData.allergens || []).includes(key) ? '#ca4d4f' : '#e2e8f0', background: (formData.allergens || []).includes(key) ? '#ebf8ff' : '#fff', borderRadius: '20px', cursor: 'pointer', fontSize: '12px', display: 'flex', alignItems: 'center', gap: '4px' }
            }, e(AllergenIcon, { type: key, lang }), ' ', val.name[lang])
          )
        )
      ),
      e('div', { style: { marginBottom: '16px' }},
        e('label', { style: { display: 'block', fontSize: '12px', color: '#718096', marginBottom: '4px' }}, '🖼️ URL Immagine (per lingue straniere)'),
        e('input', {
          type: 'url',
          value: formData.image || '',
          onChange: ev => setFormData({ ...formData, image: ev.target.value }),
          placeholder: 'https://...',
          style: { width: '100%', padding: '10px', border: '1px solid #e2e8f0', borderRadius: '6px', boxSizing: 'border-box' }
        })
      ),
      e('div', { style: { display: 'flex', gap: '12px', marginTop: '24px' }},
        e('button', { onClick: onClose, style: { flex: 1, padding: '12px', border: '1px solid #e2e8f0', background: '#fff', borderRadius: '8px', cursor: 'pointer' }}, 'Annulla'),
        e('button', { onClick: () => onSave(formData), style: { flex: 1, padding: '12px', border: 'none', background: '#ca4d4f', color: '#fff', borderRadius: '8px', cursor: 'pointer' }}, 'Salva')
      )
    )
  );
}

function AddModal({ lang, onSave, onClose }) {
  const [formData, setFormData] = useState({ name: { it: '', en: '', es: '', fr: '', de: '' }, price: 0, allergens: [], image: '' });
  const [isTranslating, setIsTranslating] = useState(false);
  const [translated, setTranslated] = useState(false);

  const toggleAllergen = (a) => {
    const current = formData.allergens || [];
    setFormData({ ...formData, allergens: current.includes(a) ? current.filter(x => x !== a) : [...current, a] });
  };

  const autoTranslate = async () => {
    if (!formData.name.it.trim()) return alert('Inserisci prima il nome in italiano.');
    setIsTranslating(true);
    try {
      const results = await Promise.all(['en','es','fr','de'].map(async tl => {
        const res = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(formData.name.it) + '&langpair=it|' + tl);
        const data = await res.json();
        return [tl, sanitizeText(data.responseData?.translatedText || formData.name.it)];
      }));
      const newName = { ...formData.name };
      results.forEach(([tl, txt]) => { newName[tl] = txt; });
      setFormData({ ...formData, name: newName });
      setTranslated(true);
    } catch(err) {
      alert('Errore nella traduzione automatica. Controlla la connessione.');
    } finally {
      setIsTranslating(false);
    }
  };

  return e('div', {
    style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, overflow: 'auto', padding: '20px' },
    onClick: onClose
  },
    e('div', {
      style: { background: '#fff', borderRadius: '16px', padding: '32px', maxWidth: '600px', width: '100%', maxHeight: '90vh', overflow: 'auto' },
      onClick: ev => ev.stopPropagation()
    },
      e('h3', { style: { margin: '0 0 20px', color: '#2d3748' }}, '➕ Aggiungi Piatto'),
      e('div', { style: { marginBottom: '8px' }},
        e('label', { style: { display: 'block', fontSize: '12px', color: '#718096', marginBottom: '4px' }}, '🇮🇹 Nome (Italiano)'),
        e('div', { style: { display: 'flex', gap: '8px' }},
          e('input', {
            type: 'text',
            value: formData.name.it || '',
            onChange: ev => { setFormData({ ...formData, name: { ...formData.name, it: ev.target.value }}); setTranslated(false); },
            style: { flex: 1, padding: '10px', border: '1px solid #e2e8f0', borderRadius: '6px', boxSizing: 'border-box' }
          }),
          e('button', {
            type: 'button',
            onClick: autoTranslate,
            disabled: isTranslating,
            style: { padding: '10px 14px', background: '#ca4d4f', color: '#fff', border: 'none', borderRadius: '6px', cursor: isTranslating ? 'wait' : 'pointer', fontSize: '13px', whiteSpace: 'nowrap', opacity: isTranslating ? 0.7 : 1 }
          }, isTranslating ? '⏳ ...' : '🌐 Traduci')
        )
      ),
      translated && e('div', { style: { margin: '0 0 12px', padding: '10px 14px', background: '#fffbea', border: '1px solid #f6e05e', borderRadius: '6px', fontSize: '13px', color: '#744210' }},
        '✅ Traduzioni generate automaticamente — controlla e correggi se necessario prima di salvare.'
      ),
      LANGUAGES.filter(l => l.code !== 'it').map(l =>
        e('div', { key: l.code, style: { marginBottom: '16px' }},
          e('label', { style: { display: 'block', fontSize: '12px', color: '#718096', marginBottom: '4px' }}, l.flag, ' Nome (', l.name, ')'),
          e('input', {
            type: 'text',
            value: formData.name[l.code] || '',
            onChange: ev => setFormData({ ...formData, name: { ...formData.name, [l.code]: ev.target.value }}),
            style: { width: '100%', padding: '10px', border: translated ? '1px solid #bee3f8' : '1px solid #e2e8f0', borderRadius: '6px', boxSizing: 'border-box', background: translated ? '#ebf8ff' : '#fff' }
          })
        )
      ),
      e('div', { style: { marginBottom: '16px' }},
        e('label', { style: { display: 'block', fontSize: '12px', color: '#718096', marginBottom: '4px' }}, 'Prezzo (€)'),
        e('input', {
          type: 'number',
          step: '0.5',
          value: formData.price,
          onChange: ev => setFormData({ ...formData, price: parseFloat(ev.target.value) || 0 }),
          style: { width: '120px', padding: '10px', border: '1px solid #e2e8f0', borderRadius: '6px' }
        })
      ),
      e('div', { style: { marginBottom: '16px' }},
        e('label', { style: { display: 'block', fontSize: '12px', color: '#718096', marginBottom: '8px' }}, 'Allergeni'),
        e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px' }},
          Object.entries(ALLERGENS).map(([key, val]) =>
            e('button', {
              key,
              type: 'button',
              onClick: () => toggleAllergen(key),
              style: { padding: '6px 12px', border: '1px solid', borderColor: (formData.allergens || []).includes(key) ? '#ca4d4f' : '#e2e8f0', background: (formData.allergens || []).includes(key) ? '#ebf8ff' : '#fff', borderRadius: '20px', cursor: 'pointer', fontSize: '12px', display: 'flex', alignItems: 'center', gap: '4px' }
            }, e(AllergenIcon, { type: key, lang }), ' ', val.name[lang])
          )
        )
      ),
      e('div', { style: { display: 'flex', gap: '12px', marginTop: '24px' }},
        e('button', { onClick: onClose, style: { flex: 1, padding: '12px', border: '1px solid #e2e8f0', background: '#fff', borderRadius: '8px', cursor: 'pointer' }}, 'Annulla'),
        e('button', { onClick: () => onSave(formData), style: { flex: 1, padding: '12px', border: 'none', background: '#38a169', color: '#fff', borderRadius: '8px', cursor: 'pointer' }}, 'Aggiungi')
      )
    )
  );
}

function EditSpecialsModal({ specials, lang, onSave, onClose }) {
  const [items, setItems] = useState([...specials]);
  const [translatingIdx, setTranslatingIdx] = useState(null);
  const [translatedItems, setTranslatedItems] = useState([]);

  const updateItem = (idx, field, value, subfield) => {
    const newItems = [...items];
    if (subfield) {
      newItems[idx][field][subfield] = value;
    } else {
      newItems[idx][field] = value;
    }
    setItems(newItems);
    if (subfield === 'it') setTranslatedItems(prev => prev.filter(i => i !== idx));
  };

  const translateSpecial = async (idx) => {
    if (!items[idx].name.it.trim()) return alert('Inserisci prima il nome in italiano.');
    setTranslatingIdx(idx);
    try {
      const langs = ['en','es','fr','de'];
      const nameResults = await Promise.all(langs.map(async tl => {
        const res = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(items[idx].name.it) + '&langpair=it|' + tl);
        const data = await res.json();
        return [tl, sanitizeText(data.responseData?.translatedText || items[idx].name.it)];
      }));
      let descResults = [];
      if (items[idx].description.it.trim()) {
        descResults = await Promise.all(langs.map(async tl => {
          const res = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(items[idx].description.it) + '&langpair=it|' + tl);
          const data = await res.json();
          return [tl, sanitizeText(data.responseData?.translatedText || items[idx].description.it, 500)];
        }));
      }
      const newItems = [...items];
      nameResults.forEach(([tl, txt]) => { newItems[idx].name[tl] = txt; });
      descResults.forEach(([tl, txt]) => { newItems[idx].description[tl] = txt; });
      setItems(newItems);
      setTranslatedItems(prev => [...new Set([...prev, idx])]);
    } catch(err) {
      alert('Errore nella traduzione automatica.');
    } finally {
      setTranslatingIdx(null);
    }
  };

  const addSpecial = () => {
    setItems([...items, { id: Date.now(), name: { it: '', en: '', es: '', fr: '', de: '' }, price: 0, description: { it: '', en: '', es: '', fr: '', de: '' }}]);
  };

  const removeSpecial = (idx) => {
    setItems(items.filter((_, i) => i !== idx));
    setTranslatedItems(prev => prev.filter(i => i !== idx).map(i => i > idx ? i - 1 : i));
  };

  const otherLangs = LANGUAGES.filter(l => l.code !== 'it');

  return e('div', {
    style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, overflow: 'auto', padding: '20px' },
    onClick: onClose
  },
    e('div', {
      style: { background: '#fff', borderRadius: '16px', padding: '32px', maxWidth: '700px', width: '100%', maxHeight: '90vh', overflow: 'auto' },
      onClick: ev => ev.stopPropagation()
    },
      e('h3', { style: { margin: '0 0 20px', color: '#2d3748' }}, '📋 Modifica Speciali del Giorno'),
      items.map((item, idx) =>
        e('div', { key: item.id, style: { marginBottom: '24px', padding: '16px', background: '#f7fafc', borderRadius: '12px' }},
          e('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '12px' }},
            e('strong', null, 'Speciale #', idx + 1),
            e('button', { onClick: () => removeSpecial(idx), style: { background: '#e53e3e', color: '#fff', border: 'none', borderRadius: '4px', padding: '4px 8px', cursor: 'pointer', fontSize: '12px' }}, '🗑️ Rimuovi')
          ),
          e('div', { style: { marginBottom: '6px' }},
            e('label', { style: { display: 'block', fontSize: '11px', color: '#718096', marginBottom: '3px' }}, '🇮🇹 Nome (Italiano)'),
            e('div', { style: { display: 'flex', gap: '8px' }},
              e('input', {
                type: 'text',
                placeholder: '🇮🇹 Nome',
                value: item.name.it || '',
                onChange: ev => updateItem(idx, 'name', ev.target.value, 'it'),
                style: { flex: 1, padding: '8px', border: '1px solid #e2e8f0', borderRadius: '4px', boxSizing: 'border-box' }
              }),
              e('button', {
                type: 'button',
                onClick: () => translateSpecial(idx),
                disabled: translatingIdx === idx,
                style: { padding: '8px 12px', background: '#ca4d4f', color: '#fff', border: 'none', borderRadius: '4px', cursor: translatingIdx === idx ? 'wait' : 'pointer', fontSize: '12px', whiteSpace: 'nowrap', opacity: translatingIdx === idx ? 0.7 : 1 }
              }, translatingIdx === idx ? '⏳ ...' : '🌐 Traduci')
            )
          ),
          e('div', { style: { marginBottom: '8px' }},
            e('label', { style: { display: 'block', fontSize: '11px', color: '#718096', marginBottom: '3px' }}, '🇮🇹 Descrizione (Italiano)'),
            e('input', {
              type: 'text',
              placeholder: '🇮🇹 Descrizione',
              value: item.description.it || '',
              onChange: ev => updateItem(idx, 'description', ev.target.value, 'it'),
              style: { width: '100%', padding: '8px', border: '1px solid #e2e8f0', borderRadius: '4px', boxSizing: 'border-box' }
            })
          ),
          translatedItems.includes(idx) && e('div', { style: { margin: '2px 0 8px', padding: '7px 12px', background: '#fffbea', border: '1px solid #f6e05e', borderRadius: '4px', fontSize: '12px', color: '#744210' }},
            '✅ Traduzioni generate — controlla e correggi se necessario.'
          ),
          otherLangs.map(l =>
            e('div', { key: l.code, style: { marginBottom: '8px' }},
              e('input', {
                type: 'text',
                placeholder: l.flag + ' Nome',
                value: item.name[l.code] || '',
                onChange: ev => updateItem(idx, 'name', ev.target.value, l.code),
                style: { width: '100%', padding: '8px', border: translatedItems.includes(idx) ? '1px solid #bee3f8' : '1px solid #e2e8f0', borderRadius: '4px', marginBottom: '4px', boxSizing: 'border-box', background: translatedItems.includes(idx) ? '#ebf8ff' : '#fff' }
              }),
              e('input', {
                type: 'text',
                placeholder: l.flag + ' Descrizione',
                value: item.description[l.code] || '',
                onChange: ev => updateItem(idx, 'description', ev.target.value, l.code),
                style: { width: '100%', padding: '8px', border: translatedItems.includes(idx) ? '1px solid #bee3f8' : '1px solid #e2e8f0', borderRadius: '4px', boxSizing: 'border-box', background: translatedItems.includes(idx) ? '#ebf8ff' : '#fff' }
              })
            )
          ),
          e('input', {
            type: 'number',
            step: '0.5',
            placeholder: 'Prezzo',
            value: item.price,
            onChange: ev => updateItem(idx, 'price', parseFloat(ev.target.value) || 0),
            style: { width: '100px', padding: '8px', border: '1px solid #e2e8f0', borderRadius: '4px', marginTop: '8px' }
          })
        )
      ),
      e('button', { onClick: addSpecial, style: { width: '100%', padding: '12px', border: '2px dashed #e2e8f0', background: '#fff', borderRadius: '8px', cursor: 'pointer', marginBottom: '20px', color: '#718096' }}, '+ Aggiungi Speciale'),
      e('div', { style: { display: 'flex', gap: '12px' }},
        e('button', { onClick: onClose, style: { flex: 1, padding: '12px', border: '1px solid #e2e8f0', background: '#fff', borderRadius: '8px', cursor: 'pointer' }}, 'Annulla'),
        e('button', { onClick: () => onSave(items), style: { flex: 1, padding: '12px', border: 'none', background: '#ca4d4f', color: '#fff', borderRadius: '8px', cursor: 'pointer' }}, 'Salva Speciali')
      )
    )
  );
}

ReactDOM.render(e(App), document.getElementById('root'));
  </script>
</body>
