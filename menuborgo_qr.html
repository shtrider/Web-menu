const fetchWithTimeout = async (url, options = {}, timeout = 8000) => {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  try {
    const response = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(id);
    return response;
  } catch (error) {
    clearTimeout(id);
    throw error;
  }
};

    if (!subs || typeof subs !== 'object') {

        console.error('Error loading menu:', error);
        setMenuData(defaultMenu);

      ),

            },
              LANGUAGES.map(l => e('button', {

                style: { display: 'block', width: '100%', padding: '10px 20px', border: 'none', background: lang === l.code ? theme.accent : '#fff', color: lang === l.code ? '#fff' : '#333', cursor: 'pointer', textAlign: 'left', fontSize: '14px' }
              }, l.flag, ' ', l.name))

          )
        )

        (mainTab === 'kitchen' ? kitchenCats : barCats).map(cat =>
          e('button', {
            key: cat,
            onClick: () => setSubCategory(cat),
            style: { padding: '10px 20px', border: subCategory === cat ? '2px solid ' + theme.catBorder : '1px solid ' + theme.navBorder, background: '#fff', color: subCategory === cat ? theme.accent : '#666', cursor: 'pointer', borderRadius: '24px', fontSize: '14px', fontWeight: subCategory === cat ? '600' : '400', whiteSpace: 'nowrap', flexShrink: 0 }
          }, CATEGORY_NAMES[cat]?.[lang] || cat)
        )
      )
    ),
    renderCoperto(2),
    renderCoperto(5),

    e('main', { style: { padding: '24px', maxWidth: '900px', margin: '0 auto' }},
      e('h2', { style: { margin: '0 0 20px', color: theme.accent, fontSize: 'clamp(22px, 5vw, 28px)', fontWeight: '600' }}, CATEGORY_NAMES[subCategory]?.[lang] || subCategory),

      renderCoperto(3),
      e('div', { style: { display: 'flex', flexDirection: 'column', gap: '12px' }},
        currentItems.map((item) => item.type === 'subcategory' ? renderSubHeader(item) : renderItemCard(item))
      ),

      e('div', { style: { marginTop: '32px', padding: '16px', background: theme.legendBg, borderRadius: '12px' }},
        renderCoperto(4),
        e('h4', { style: { margin: '0 0 12px', fontSize: '14px', color: '#718096' }}, lang === 'it' ? 'Allergeni' : lang === 'es' ? 'Leyenda de Alérgenos' : lang === 'fr' ? 'Légende des Allergènes' : lang === 'de' ? 'Allergen-Legende' : lang === 'zh' ? '过敏原说明' : lang === 'ja' ? 'アレルゲン一覧' : 'Allergen Legend'),
        e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '16px' }},
          Object.entries(ALLERGENS).map(([key, val]) =>
            e('span', { key, style: { fontSize: '12px', color: '#4a5568', display: 'flex', alignItems: 'center', gap: '6px' }},
              e(AllergenIcon, { type: key, lang }),
              ' ', val.name[lang]
            )
          )
        )
      )
    ),

    renderCoperto(1),

    e('footer', { style: { textAlign: 'center', padding: '24px', color: theme.footerColor, fontSize: '12px' }},
      '\u00A9 ' + new Date().getFullYear() + ' Borgo della Mistica'
    ),

    // Sticky bottom reservation bar
    e('div', { style: { position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 1000, background: 'linear-gradient(135deg, #ca4d4f 0%, #a03032 100%)', boxShadow: '0 -2px 12px rgba(0,0,0,0.15)', padding: '0' }},
      e('a', {
        href: 'https://borgomistica.superbexperience.com/reserve/experience/67d1ea7250ccfac6d7ae747e',
        target: '_blank',
        rel: 'noopener noreferrer',
        style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px', padding: '16px 24px', color: '#fff', textDecoration: 'none', fontSize: '17px', fontWeight: '600', letterSpacing: '0.5px' }

        e('span', { style: { fontSize: '20px' }}, '\uD83D\uDD14'),

}

  </script>
